{% load static %}
<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GuardianNet Giriş</title><link rel="stylesheet" href="{% static 'css/style.css' %}"></head>
<body class="login-page"><main class="login-card"><h1>GuardianNet</h1><p>Akıllı Ağ Güvenlik İzleme</p>
{% for message in messages %}<div class="message">{{ message }}</div>{% endfor %}
<form method="post" action="{% url 'login' %}">{% csrf_token %}<input type="hidden" name="next" value="{{ next }}">
<label>Kullanıcı adı {{ form.username }}</label><label>Şifre {{ form.password }}</label><button type="submit">Giriş Yap</button></form>
<small>Yetkili kullanıcı erişimi</small></main></body></html>
