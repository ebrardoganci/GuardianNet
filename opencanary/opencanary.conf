{
  "device.node_id": "guardiannet-honeypot",
  "ip.ignorelist": [],
  "ftp.enabled": true,
  "ftp.port": 2121,
  "http.enabled": true,
  "http.port": 8080,
  "ssh.enabled": true,
  "ssh.port": 2222,
  "telnet.enabled": false,
  "mysql.enabled": false,
  "redis.enabled": false,
  "logger": {
    "class": "PyLogger",
    "kwargs": {
      "formatters": {"plain": {"format": "%(message)s"}},
      "handlers": {
        "file": {
          "class": "logging.FileHandler",
          "filename": "/var/tmp/opencanary/opencanary.log",
          "formatter": "plain",
          "encoding": "utf-8"
        },
        "console": {
          "class": "logging.StreamHandler",
          "stream": "ext://sys.stdout",
          "formatter": "plain"
        }
      }
    }
  }
}
